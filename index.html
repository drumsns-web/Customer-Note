<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Customer Note</title>
<meta name="theme-color" content="#091019" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Customer Note" />
<link rel="icon" href="./icon.png" />
<link rel="apple-touch-icon" href="./icon.png" />
<style>
:root{--bg:#071018;--panel:#101b26;--panel2:#162334;--line:#26394d;--text:#eef7fb;--muted:#95aabc;--accent:#18c7bf;--accent2:#6cf1d6;--warn:#ffd46b;--danger:#ff716d}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#122239 0%,#091019 58%,#05090e 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{font-size:16px}button,input,select,textarea{font:inherit}button{cursor:pointer;touch-action:manipulation}
.wrap{max-width:1040px;margin:0 auto;padding:12px 12px 28px}.top,.panel{background:rgba(16,27,38,.96);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 44px rgba(0,0,0,.28)}.top{padding:12px}
.header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.brand{display:flex;align-items:center;gap:10px}.brand img{width:44px;height:44px;border-radius:12px}.title h1{margin:0;font-size:21px;line-height:1.1}.title span{display:block;margin-top:3px;font-size:12px;color:var(--muted)}.chip{font-size:12px;padding:7px 10px;border-radius:999px;background:rgba(24,199,191,.12);border:1px solid rgba(24,199,191,.25);white-space:nowrap}
.nav{display:grid;grid-template-columns:52px 1fr 52px;align-items:center;gap:8px}.btn{min-height:48px;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;font-size:20px}.month{text-align:center;font-size:18px;font-weight:900}
.weekdays,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.weekday{text-align:center;font-size:12px;color:var(--muted);padding:8px 0 3px}.day{min-height:94px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:7px;display:flex;flex-direction:column;justify-content:space-between;text-align:left;color:inherit}.day.empty{background:transparent;border:1px dashed rgba(38,57,77,.35);cursor:default}.day.selected{outline:2px solid rgba(24,199,191,.75)}.date{font-size:13px;font-weight:900}.sale{font-size:12px;font-weight:900}.people{font-size:12px;color:var(--accent2);font-weight:900}.bar{height:6px;width:100%;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}.cbtn{min-height:46px;border:1px solid transparent;border-radius:14px;background:linear-gradient(135deg,#20354d,#162334);color:var(--text);font-weight:800}.cbtn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#031515}.cbtn.warn{background:linear-gradient(135deg,#ffd46b,#ffb24f);color:#2a1900}.cbtn.danger{background:linear-gradient(135deg,#ff8a7a,#ff5f6a);color:white}.cbtn.ghost{border-color:var(--line);background:#1a2635}
.main{display:grid;grid-template-columns:1.25fr .95fr;gap:10px;margin-top:10px}.panel{padding:12px}.panel h2{margin:0 0 10px;font-size:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat,.result,.item{background:var(--panel2);border:1px solid var(--line);border-radius:14px}.stat{padding:10px}.label{font-size:11px;color:var(--muted);margin-bottom:4px}.value{font-size:20px;font-weight:900}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.tag{font-size:12px;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.list{margin:10px 0 0;padding:0;list-style:none;display:grid;gap:8px}.item{display:flex;gap:10px;align-items:flex-start;padding:10px}.dot{width:10px;height:10px;border-radius:50%;margin-top:5px;background:linear-gradient(180deg,var(--accent),var(--accent2))}.item strong{display:block;font-size:13px;margin-bottom:3px}.item span,.tiny{font-size:12px;color:var(--muted);line-height:1.55}
.searchbox{display:grid;gap:8px}.searchbox input,.searchbox select,.field input,.field textarea{width:100%;min-height:46px;border-radius:14px;border:1px solid var(--line);background:#0d151f;color:var(--text);padding:11px 12px}.split{display:grid;grid-template-columns:1fr 112px;gap:8px}.results{margin-top:8px;display:grid;gap:8px;max-height:270px;overflow:auto}.result{padding:10px;text-align:left;color:inherit}.result b{display:block;font-size:14px;margin-bottom:4px}.result small{color:var(--muted);display:block;line-height:1.45}
.modalback{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;align-items:flex-end;justify-content:center;padding:12px;z-index:20}.modal{width:min(100%,720px);background:#0f1722;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 22px 54px rgba(0,0,0,.45)}.modalhead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}.modalhead h3{margin:0;font-size:16px}.xbtn{min-width:42px;min-height:42px;border:none;border-radius:12px;background:#1b2837;color:var(--text);font-size:18px}.modalgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:grid;gap:6px;margin-bottom:8px}.field label{font-size:12px;color:var(--muted)}.field textarea{min-height:90px;resize:vertical}.modalactions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#0f1722;border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.4);display:none;z-index:30;max-width:min(92vw,560px)}
.lock{position:fixed;inset:0;z-index:99;background:radial-gradient(circle at top,#13253a 0%,#091019 62%,#060b11 100%);display:none;align-items:center;justify-content:center;padding:14px}.lock-card{width:min(100%,420px);background:rgba(16,27,38,.98);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}.lock-card h2{margin:0 0 8px;font-size:22px}.lock-card p{margin:0 0 14px;color:var(--muted);line-height:1.6}.lock-card input{width:100%;min-height:52px;border-radius:14px;border:1px solid var(--line);background:#0d151f;color:var(--text);padding:12px 14px;font-size:18px;letter-spacing:.2em;text-align:center}.lock-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
@media (max-width:860px){.main{grid-template-columns:1fr}.controls{grid-template-columns:repeat(2,1fr)}.day{min-height:84px}}
@media (max-width:460px){.wrap{padding:8px}.header{align-items:flex-start}.brand img{width:38px;height:38px}.chip{display:none}.day{min-height:76px;padding:5px}.date,.sale,.people{font-size:11px}.row,.modalgrid,.controls,.lock-actions{grid-template-columns:1fr}.split{grid-template-columns:1fr}.month{font-size:16px}}
</style>
</head>
<body>
<div class="lock" id="lockScreen">
  <div class="lock-card">
    <h2>ロック解除</h2>
    <p>PINを設定している場合は、番号を入力して解除してください。初回は「PIN設定」で登録できます。</p>
    <input id="pinInput" type="password" inputmode="numeric" placeholder="4桁以上のPIN" maxlength="12" />
    <div class="lock-actions">
      <button type="button" class="cbtn primary" id="unlockBtn">解除</button>
      <button type="button" class="cbtn ghost" id="setupBtn">PIN設定</button>
    </div>
    <div class="lock-actions">
      <button type="button" class="cbtn ghost" id="skipLockBtn">今回は開く</button>
      <button type="button" class="cbtn danger" id="resetPinBtn">PIN削除</button>
    </div>
  </div>
</div>

<div class="wrap" id="appRoot">
  <section class="top">
    <div class="header">
      <div class="brand"><img src="./icon.png" alt="" /><div class="title"><h1>Customer Note</h1><span>顧客・売上・来店記録をカレンダーで管理</span></div></div>
      <div class="chip">自動保存 / 検索対応</div>
    </div>
    <div class="nav"><button class="btn" id="prevMonthBtn" type="button">‹</button><div class="month" id="monthLabel"></div><button class="btn" id="nextMonthBtn" type="button">›</button></div>
    <div class="weekdays"><div class="weekday">日</div><div class="weekday">月</div><div class="weekday">火</div><div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div><div class="weekday">土</div></div>
    <div class="grid" id="calendarGrid"></div>
    <div class="controls">
      <button class="cbtn primary" id="addRecordBtn" type="button">記録追加</button>
      <button class="cbtn" id="saveBtn" type="button">保存</button>
      <button class="cbtn" id="loadBtn" type="button">読込</button>
      <button class="cbtn warn" id="exportBtn" type="button">書出</button>
      <button class="cbtn danger" id="clearBtn" type="button">全消去</button>
    </div>
  </section>
  <div class="main">
    <section class="panel">
      <h2 id="detailTitle">日別詳細</h2>
      <div class="row"><div class="stat"><div class="label">売上</div><div class="value" id="saleValue">-</div></div><div class="stat"><div class="label">来店数</div><div class="value" id="peopleValue">-</div></div></div>
      <div class="tags" id="tagArea"></div>
      <ul class="list" id="logList"></ul>
      <div class="tiny">日付を押すと詳細が切り替わります。「記録追加」から編集できます。</div>
    </section>
    <section class="panel">
      <h2>顧客検索</h2>
      <div class="searchbox">
        <input id="searchInput" placeholder="名前 / 特徴 / メモ / タグで検索" />
        <div class="split"><select id="tagFilter"><option value="">全タグ</option></select><button class="cbtn primary" id="searchBtn" type="button">検索</button></div>
        <div class="results" id="searchResults"></div>
      </div>
      <h2 style="margin-top:14px">月まとめ</h2>
      <div class="row"><div class="stat"><div class="label">月売上</div><div class="value" id="monthSales">-</div></div><div class="stat"><div class="label">記録日数</div><div class="value" id="monthVisits">-</div></div></div>
      <canvas id="barChart" width="800" height="260" style="width:100%;margin-top:10px;background:#0b1118;border:1px solid var(--line);border-radius:14px"></canvas>
    </section>
  </div>
</div>

<div class="modalback" id="modalBack">
  <div class="modal">
    <div class="modalhead"><h3 id="modalTitle">記録を追加</h3><button class="xbtn" id="closeModalBtn" type="button">×</button></div>
    <div class="modalgrid"><div class="field"><label>日付</label><input id="fDate" type="date" /></div><div class="field"><label>顧客名</label><input id="fName" type="text" placeholder="例: 山田太郎" /></div></div>
    <div class="modalgrid"><div class="field"><label>売上</label><input id="fSale" type="number" min="0" step="1" placeholder="例: 49000" /></div><div class="field"><label>来店数</label><input id="fPeople" type="number" min="0" step="1" placeholder="例: 13" /></div></div>
    <div class="field"><label>タグ / 特徴（カンマ区切り）</label><input id="fTags" type="text" placeholder="常連, カラオケ多め, ボトルあり" /></div>
    <div class="field"><label>その日のメモ</label><textarea id="fMemo" placeholder="例: 先月グラスを割ったお客様。ボトル更新。"></textarea></div>
    <div class="field"><label>追記メモ（複数行）</label><textarea id="fNotes" placeholder="1行ずつ入力できます。検索にも使われます。"></textarea></div>
    <div class="modalactions"><button class="cbtn primary" id="saveRecordBtn" type="button">保存する</button><button class="cbtn danger" id="deleteRecordBtn" type="button">この日を削除</button></div>
  </div>
</div>

<div class="modalback" id="confirmBack" style="align-items:center">
  <div class="modal" style="max-width:520px">
    <div class="modalhead"><h3>全消去の確認</h3><button class="xbtn" id="closeConfirmBtn" type="button">×</button></div>
    <p class="tiny" style="font-size:14px">すべての記録を消去します。直後なら画面下の「元に戻す」で復元できます。</p>
    <div class="modalactions"><button class="cbtn danger" id="confirmClearBtn" type="button">すべて消去</button><button class="cbtn" id="cancelClearBtn" type="button">キャンセル</button></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastText"></span> <button class="cbtn warn" id="undoBtn" type="button" style="min-height:36px;margin-left:10px">元に戻す</button></div>

<script>
(() => {
  const LS_KEY = "customer_note_data_v5";
  const PIN_KEY = "customer_note_pin_v1";
  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = isoDate(today);
  let data = loadData();
  let lastBackup = null;
  const $ = (id) => document.getElementById(id);

  function isoDate(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
  function pad(n) { return String(n).padStart(2, "0"); }
  function money(n) { return "¥" + Number(n || 0).toLocaleString("ja-JP"); }
  function shortMoney(n) { const v = Number(n || 0); return v ? `${(v / 10000).toFixed(v >= 100000 ? 0 : 1).replace(/\.0$/, "")}万` : "-"; }
  function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])); }
  function defaultData() {
    return {
      [selectedDate]: {
        name: "サンプル顧客",
        sale: 49000,
        people: 13,
        tags: ["常連", "ボトルあり"],
        memo: "ここに顧客メモや出来事を保存できます。",
        notes: ["検索欄から名前、タグ、メモを探せます。"]
      }
    };
  }
  function loadData() {
    try {
      const saved = localStorage.getItem(LS_KEY);
      return saved ? JSON.parse(saved) : defaultData();
    } catch {
      return defaultData();
    }
  }
  function saveData() { localStorage.setItem(LS_KEY, JSON.stringify(data)); }

  function datesOfMonth(y, m) {
    const end = new Date(y, m + 1, 0).getDate();
    return Array.from({ length: end }, (_, i) => `${y}-${pad(m + 1)}-${pad(i + 1)}`);
  }
  function renderCalendar() {
    $("monthLabel").textContent = `${currentYear}年${currentMonth + 1}月`;
    const grid = $("calendarGrid");
    grid.innerHTML = "";
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    for (let i = 0; i < firstDay; i++) grid.insertAdjacentHTML("beforeend", '<button class="day empty" type="button" disabled></button>');
    const dates = datesOfMonth(currentYear, currentMonth);
    const maxSale = Math.max(1, ...dates.map((d) => Number(data[d]?.sale || 0)));
    for (const date of dates) {
      const item = data[date];
      const day = Number(date.slice(8, 10));
      const width = item ? Math.round((Number(item.sale || 0) / maxSale) * 100) : 0;
      grid.insertAdjacentHTML("beforeend", `
        <button class="day ${date === selectedDate ? "selected" : ""}" data-date="${date}" type="button">
          <div class="date">${day}</div>
          <div><div class="sale">${item ? shortMoney(item.sale) : "-"}</div><div class="people">${item ? `${item.people || 0}名` : "未入力"}</div></div>
          <div class="bar"><span style="width:${width}%"></span></div>
        </button>`);
    }
    grid.querySelectorAll("[data-date]").forEach((btn) => btn.addEventListener("click", () => selectDate(btn.dataset.date)));
  }
  function renderDetail(date) {
    selectedDate = date;
    const item = data[date] || { name: "", sale: 0, people: 0, tags: [], memo: "", notes: [] };
    $("detailTitle").textContent = `${Number(date.slice(5, 7))}月${Number(date.slice(8, 10))}日の詳細`;
    $("saleValue").textContent = item.sale ? money(item.sale) : "-";
    $("peopleValue").textContent = item.people ? `${item.people}名` : "-";
    $("tagArea").innerHTML = (item.tags || []).map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("") || '<span class="tag">タグなし</span>';
    const notes = [item.memo, ...(item.notes || [])].filter(Boolean);
    $("logList").innerHTML = notes.length
      ? notes.map((n) => `<li class="item"><div class="dot"></div><div><strong>${escapeHtml(n)}</strong><span>${escapeHtml(item.name || "名称未設定")}</span></div></li>`).join("")
      : '<li class="item"><div class="dot"></div><div><strong>記録なし</strong><span>この日の内容を追加できます。</span></div></li>';
    fillModal(date);
    renderCalendar();
    updateTagFilter();
    updateSearchResults();
    updateMonthlySummary();
  }
  function fillModal(date) {
    const item = data[date] || { name: "", sale: "", people: "", tags: [], memo: "", notes: [] };
    $("fDate").value = date;
    $("fName").value = item.name || "";
    $("fSale").value = item.sale || "";
    $("fPeople").value = item.people || "";
    $("fTags").value = (item.tags || []).join(", ");
    $("fMemo").value = item.memo || "";
    $("fNotes").value = (item.notes || []).join("\n");
  }
  function selectDate(date) { renderDetail(date); }
  function openModal(date) {
    fillModal(date || selectedDate);
    $("modalTitle").textContent = data[date || selectedDate] ? "記録を編集" : "記録を追加";
    $("modalBack").style.display = "flex";
  }
  function closeModal() { $("modalBack").style.display = "none"; }
  function saveRecord() {
    const date = $("fDate").value;
    if (!date) { alert("日付を入力してください"); return; }
    data[date] = {
      name: $("fName").value.trim(),
      sale: Number($("fSale").value || 0),
      people: Number($("fPeople").value || 0),
      tags: $("fTags").value.split(",").map((s) => s.trim()).filter(Boolean),
      memo: $("fMemo").value.trim(),
      notes: $("fNotes").value.split(/\n+/).map((s) => s.trim()).filter(Boolean)
    };
    const d = new Date(`${date}T00:00:00`);
    currentYear = d.getFullYear();
    currentMonth = d.getMonth();
    saveData();
    closeModal();
    renderDetail(date);
    showToast("保存しました");
  }
  function deleteRecord() {
    const date = $("fDate").value;
    if (!date || !data[date]) return;
    const backup = JSON.parse(JSON.stringify(data[date]));
    delete data[date];
    saveData();
    closeModal();
    renderDetail(date);
    showToast("削除しました", () => {
      data[date] = backup;
      saveData();
      renderDetail(date);
      hideToast();
    });
  }
  function updateTagFilter() {
    const tags = new Set();
    Object.values(data).forEach((v) => (v.tags || []).forEach((t) => tags.add(t)));
    const current = $("tagFilter").value;
    $("tagFilter").innerHTML = '<option value="">全タグ</option>' + [...tags].sort().map((t) => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
    $("tagFilter").value = current;
  }
  function searchText(item) { return [item.name, item.memo, ...(item.tags || []), ...(item.notes || [])].join(" ").toLowerCase(); }
  function updateSearchResults() {
    const q = $("searchInput").value.trim().toLowerCase();
    const tag = $("tagFilter").value;
    const rows = Object.entries(data).filter(([, item]) => (!q || searchText(item).includes(q)) && (!tag || (item.tags || []).includes(tag))).sort((a, b) => b[0].localeCompare(a[0]));
    $("searchResults").innerHTML = rows.length ? rows.slice(0, 30).map(([date, item]) => `
      <button class="result" type="button" data-date="${date}">
        <b>${escapeHtml(date)} / ${escapeHtml(item.name || "名称未設定")}</b>
        <small>売上 ${money(item.sale || 0)} / 来店 ${item.people || 0}名<br>${escapeHtml((item.tags || []).join(" / ") || "タグなし")}<br>${escapeHtml((item.memo || "").slice(0, 90))}</small>
      </button>`).join("") : '<div class="result"><b>候補なし</b><small>検索条件を変えてください。</small></div>';
    $("searchResults").querySelectorAll("[data-date]").forEach((btn) => btn.addEventListener("click", () => selectDate(btn.dataset.date)));
  }
  function updateMonthlySummary() {
    const dates = datesOfMonth(currentYear, currentMonth);
    let sales = 0;
    let count = 0;
    for (const d of dates) {
      if (data[d]) {
        sales += Number(data[d].sale || 0);
        count++;
      }
    }
    $("monthSales").textContent = money(sales);
    $("monthVisits").textContent = `${count}日`;
    drawChart(dates);
  }
  function drawChart(dates) {
    const c = $("barChart");
    const ctx = c.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const w = c.clientWidth || 800;
    const h = 260;
    c.width = Math.round(w * dpr);
    c.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    const sales = dates.map((d) => Number(data[d]?.sale || 0));
    const max = Math.max(1, ...sales);
    const left = 36, right = 10, top = 18, bottom = 28;
    ctx.fillStyle = "#0b1118";
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = "rgba(255,255,255,.08)";
    for (let i = 0; i < 4; i++) {
      const y = top + ((h - top - bottom) / 3) * i;
      ctx.beginPath();
      ctx.moveTo(left, y);
      ctx.lineTo(w - right, y);
      ctx.stroke();
    }
    const bw = (w - left - right) / dates.length;
    dates.forEach((d, i) => {
      const val = sales[i];
      const bh = (h - top - bottom) * (val / max);
      const x = left + i * bw + bw * 0.2;
      const y = h - bottom - bh;
      const barw = Math.max(3, bw * 0.6);
      ctx.fillStyle = "#18c7bf";
      ctx.fillRect(x, y, barw, bh);
    });
    ctx.fillStyle = "#b9c9d8";
    ctx.font = "12px -apple-system,BlinkMacSystemFont,sans-serif";
    ctx.fillText("月別売上", 10, 16);
  }
  function exportJson() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "customer-note-backup.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }
  function importJson() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.addEventListener("change", async () => {
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        data = JSON.parse(await file.text());
        saveData();
        renderDetail(selectedDate);
        showToast("読み込みました");
      } catch {
        alert("JSONファイルを読み込めませんでした");
      }
    });
    input.click();
  }
  function clearAll() {
    lastBackup = JSON.parse(JSON.stringify(data));
    data = {};
    saveData();
    renderDetail(selectedDate);
    showToast("すべて消去しました", () => {
      data = lastBackup || {};
      saveData();
      renderDetail(selectedDate);
      hideToast();
    });
  }
  function showToast(text, undoAction) {
    $("toastText").textContent = text;
    $("undoBtn").style.display = undoAction ? "inline-flex" : "none";
    $("undoBtn").onclick = undoAction || null;
    $("toast").style.display = "block";
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(hideToast, 4500);
  }
  function hideToast() { $("toast").style.display = "none"; }
  function showApp() { $("lockScreen").style.display = "none"; $("appRoot").style.display = "block"; }
  function showLockIfNeeded() {
    if (localStorage.getItem(PIN_KEY)) {
      $("appRoot").style.display = "none";
      $("lockScreen").style.display = "flex";
    } else {
      showApp();
    }
  }
  function bind() {
    $("prevMonthBtn").addEventListener("click", () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderDetail(selectedDate); });
    $("nextMonthBtn").addEventListener("click", () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderDetail(selectedDate); });
    $("addRecordBtn").addEventListener("click", () => openModal(selectedDate));
    $("saveBtn").addEventListener("click", () => { saveData(); showToast("保存しました"); });
    $("loadBtn").addEventListener("click", importJson);
    $("exportBtn").addEventListener("click", exportJson);
    $("clearBtn").addEventListener("click", () => { $("confirmBack").style.display = "flex"; });
    $("closeModalBtn").addEventListener("click", closeModal);
    $("modalBack").addEventListener("click", (e) => { if (e.target.id === "modalBack") closeModal(); });
    $("saveRecordBtn").addEventListener("click", saveRecord);
    $("deleteRecordBtn").addEventListener("click", deleteRecord);
    $("searchBtn").addEventListener("click", updateSearchResults);
    $("searchInput").addEventListener("input", updateSearchResults);
    $("tagFilter").addEventListener("change", updateSearchResults);
    $("closeConfirmBtn").addEventListener("click", () => { $("confirmBack").style.display = "none"; });
    $("cancelClearBtn").addEventListener("click", () => { $("confirmBack").style.display = "none"; });
    $("confirmClearBtn").addEventListener("click", () => { $("confirmBack").style.display = "none"; clearAll(); });
    $("unlockBtn").addEventListener("click", () => {
      if ($("pinInput").value === localStorage.getItem(PIN_KEY)) showApp();
      else alert("PINが違います");
    });
    $("setupBtn").addEventListener("click", () => {
      const pin = $("pinInput").value.trim();
      if (pin.length < 4) { alert("4桁以上で設定してください"); return; }
      localStorage.setItem(PIN_KEY, pin);
      showToast("PINを設定しました");
      showApp();
    });
    $("skipLockBtn").addEventListener("click", showApp);
    $("resetPinBtn").addEventListener("click", () => { localStorage.removeItem(PIN_KEY); $("pinInput").value = ""; showApp(); showToast("PINを削除しました"); });
    $("pinInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("unlockBtn").click(); });
    window.addEventListener("resize", () => drawChart(datesOfMonth(currentYear, currentMonth)));
  }
  bind();
  renderDetail(selectedDate);
  showLockIfNeeded();
})();
</script>
</body>
</html>
